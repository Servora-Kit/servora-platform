name: servora authorization model tests
model_file: ../model/servora.fga

tuples:
  # Platform admin
  - user: user:platform-admin
    relation: admin
    object: platform:default

  # Tenant setup (platform:default linked for inheritance chain)
  - user: platform:default
    relation: platform
    object: tenant:root

  - user: user:tenant-owner
    relation: owner
    object: tenant:root

  - user: user:tenant-admin
    relation: admin
    object: tenant:root

  - user: user:tenant-member
    relation: member
    object: tenant:root

  # Organization setup
  - user: tenant:root
    relation: tenant
    object: organization:acme

  - user: user:org-owner
    relation: owner
    object: organization:acme

  - user: user:org-admin
    relation: admin
    object: organization:acme

  - user: user:org-member
    relation: member
    object: organization:acme

  - user: user:org-viewer
    relation: viewer
    object: organization:acme

tests:
  # --- Platform tests ---

  - name: platform admin can manage all tenants
    check:
      - user: user:platform-admin
        object: platform:default
        assertions:
          admin: true
          can_view_all_tenants: true
          can_manage_all_tenants: true

  - name: tenant admin has no platform admin permission
    check:
      - user: user:tenant-admin
        object: platform:default
        assertions:
          admin: false
          can_view_all_tenants: false
          can_manage_all_tenants: false

  # --- Tenant tests ---

  - name: tenant owner inherits admin and member
    check:
      - user: user:tenant-owner
        object: tenant:root
        assertions:
          owner: true
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: true

  - name: tenant admin has member and can_manage access but cannot transfer ownership
    check:
      - user: user:tenant-admin
        object: tenant:root
        assertions:
          owner: false
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: false

  - name: tenant member can view but not manage
    check:
      - user: user:tenant-member
        object: tenant:root
        assertions:
          owner: false
          admin: false
          member: true
          can_view: true
          can_manage: false
          can_manage_members: false
          can_transfer_ownership: false

  - name: platform admin inherits tenant admin via inheritance chain
    check:
      - user: user:platform-admin
        object: tenant:root
        assertions:
          owner: false
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: true

  # --- Organization tests ---

  - name: organization owner inherits admin and member and can transfer ownership
    check:
      - user: user:org-owner
        object: organization:acme
        assertions:
          owner: true
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: true

  - name: organization admin inherits member but not owner and cannot transfer ownership
    check:
      - user: user:org-admin
        object: organization:acme
        assertions:
          owner: false
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: false

  - name: organization member can view but not manage
    check:
      - user: user:org-member
        object: organization:acme
        assertions:
          owner: false
          admin: false
          member: true
          viewer: true
          can_view: true
          can_manage: false
          can_manage_members: false
          can_transfer_ownership: false

  - name: organization viewer can only view
    check:
      - user: user:org-viewer
        object: organization:acme
        assertions:
          owner: false
          admin: false
          member: false
          viewer: true
          can_view: true
          can_manage: false
          can_manage_members: false
          can_transfer_ownership: false

  - name: tenant admin inherits organization admin via tenant relation
    check:
      - user: user:tenant-admin
        object: organization:acme
        assertions:
          owner: false
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: true

  - name: tenant member inherits organization member via tenant relation
    check:
      - user: user:tenant-member
        object: organization:acme
        assertions:
          owner: false
          admin: false
          member: true
          viewer: true
          can_view: true
          can_manage: false
          can_manage_members: false
          can_transfer_ownership: false

  - name: platform admin inherits organization admin via full inheritance chain
    check:
      - user: user:platform-admin
        object: organization:acme
        assertions:
          owner: false
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true
          can_transfer_ownership: true
