api:
  insecure: true
ping: {}

entryPoints:
  web:
    address: ":80"
  # Prometheus 拉取指标用（仅容器内网）
  metrics:
    address: ":8082"

# 接入 OpenTelemetry Collector，链路在 Jaeger/Grafana 中查看
tracing:
  serviceName: traefik
  sampleRate: 1.0
  otlp:
    grpc:
      endpoint: otel-collector:4317
      insecure: true

# 暴露 Prometheus 指标，由 Prometheus 抓取后可在 Grafana 制图
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: metrics

providers:
  consulCatalog:
    endpoint:
      address: consul:8500
      scheme: http
      datacenter: dc1
    exposedByDefault: false
    refreshInterval: 5s
    prefix: traefik

log:
  level: INFO

accessLog: {}
