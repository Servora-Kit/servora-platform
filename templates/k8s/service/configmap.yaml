apiVersion: v1
kind: ConfigMap
metadata:
  name: SERVICE_NAME-config
  namespace: servora
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 30s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 30s

    log:
      level: info
      format: json

    trace:
      endpoint: http://otel-collector:4318
