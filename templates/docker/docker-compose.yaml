version: '3.8'

services:
  # Your service
  SERVICE_NAME:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "9000:9000"
    environment:
      - SERVICE_NAME=SERVICE_NAME
      - LOG_LEVEL=info
      - TRACE_ENDPOINT=http://otel-collector:4318
    depends_on:
      - postgres
      - redis
      - otel-collector
    networks:
      - servora-net

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: servora
      POSTGRES_USER: servora
      POSTGRES_PASSWORD: servora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - servora-net

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - servora-net

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./manifests/otel/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    networks:
      - servora-net

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./manifests/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - servora-net

  # Grafana
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./manifests/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - servora-net

  # Loki
  loki:
    image: grafana/loki:latest
    volumes:
      - ./manifests/loki/loki.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - servora-net

volumes:
  postgres-data:
  grafana-data:

networks:
  servora-net:
    driver: bridge
