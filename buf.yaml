version: v2

modules:
  - path: app/audit/service/api/protos
    name: buf.build/servora/servora-platform

deps:
  - buf.build/servora/servora
  - buf.build/googleapis/googleapis

breaking:
  use:
    - FILE

lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
