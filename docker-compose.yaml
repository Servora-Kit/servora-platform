services:
  consul:
    image: consul:1.15.4
    container_name: platform_consul
    restart: unless-stopped
    command:
      - agent
      - -server
      - -ui
      - -node=consul-server-1
      - -bootstrap-expect=1
      - -client=0.0.0.0
      - -data-dir=/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - platform-consul-data:/consul/data
    networks:
      - platform-network

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: platform_jaeger
    restart: unless-stopped
    environment:
      JAEGER_LISTEN_HOST: 0.0.0.0
    ports:
      - "16686:16686"
    networks:
      - platform-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: platform_otel_collector
    user: "0:0"
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    healthcheck:
      test:
        [
          "CMD",
          "/otelcol-contrib",
          "validate",
          "--config=/etc/otelcol/config.yaml",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./manifests/otel/otel-collector.yaml:/etc/otelcol/config.yaml:ro
      - audit-logs:/var/log/audit:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
      - loki
    networks:
      - platform-network

  loki:
    image: grafana/loki:latest
    container_name: platform_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "16685:3100"
    volumes:
      - ./manifests/loki/loki.yaml:/etc/loki/config.yaml:ro
      - platform-loki-data:/loki
    networks:
      - platform-network

  prometheus:
    image: prom/prometheus:latest
    container_name: platform_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./manifests/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - platform-prometheus-data:/prometheus
    networks:
      - platform-network

  grafana:
    image: grafana/grafana:latest
    container_name: platform_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_METRICS_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./manifests/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./manifests/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - platform-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - platform-network

  traefik:
    image: traefik:v3.6
    container_name: platform_traefik
    restart: unless-stopped
    depends_on:
      consul:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik.yaml
    ports:
      - "8080:80"
      - "8081:8080"
      - "8082:8082"
    volumes:
      - ./manifests/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform-network

  kafka:
    image: apache/kafka:latest
    container_name: platform_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_CLUSTER_ID: "U3VyYW9LYWZrYUNsdXN0ZXI"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - platform-kafka-data:/var/lib/kafka/data
    networks:
      - platform-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: platform_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: servora_audit
      CLICKHOUSE_USER: servora
      CLICKHOUSE_PASSWORD: servora_ch_pwd
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user servora --password servora_ch_pwd --query 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - platform-clickhouse-data:/var/lib/clickhouse
    networks:
      - platform-network

volumes:
  platform-consul-data:
  platform-loki-data:
  platform-prometheus-data:
  platform-grafana-data:
  platform-kafka-data:
  platform-clickhouse-data:
  audit-logs:

networks:
  platform-network:
