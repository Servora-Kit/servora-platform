version: v2

clean: true

managed:
    enabled: true

    disable:
        - module: buf.build/googleapis/googleapis
        - module: buf.build/bufbuild/protovalidate
        - module: buf.build/kratos/apis
        - module: buf.build/gnostic/gnostic
        - module: buf.build/gogo/protobuf
        - module: buf.build/menta2k-org/redact
        # 保留 conf proto 的原始 go_package 设置
        - file_option: go_package
          path: servora/conf/v1/conf.proto
        - file_option: go_package
          path: servora/iam/conf/v1/config.proto

plugins:
    # generate go struct code
    - local: protoc-gen-go
      out: api/gen/go
      opt: paths=source_relative

    # generate grpc service code
    - local: protoc-gen-go-grpc
      out: api/gen/go
      opt: paths=source_relative

    # generate kratos http service code
    - local: protoc-gen-go-http
      out: api/gen/go
      opt: paths=source_relative

    # generate kratos errors code
    - local: protoc-gen-go-errors
      out: api/gen/go
      opt: paths=source_relative

    # generate message validator code
    - local: protoc-gen-validate
      out: api/gen/go
      opt:
          - paths=source_relative
          - lang=go

    # ==================== Servora custom plugins ====================

    # generate authz rules from proto annotations
    - local: protoc-gen-servora-authz
      out: api/gen/go
      opt: paths=source_relative

    # generate mapper plans from proto annotations
    - local: protoc-gen-servora-mapper
      out: api/gen/go
      opt: paths=source_relative
