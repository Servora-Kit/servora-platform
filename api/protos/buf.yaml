version: v1

build:
  excludes: []

deps:
  - "buf.build/googleapis/googleapis"
  - "buf.build/kratos/apis"
  - "buf.build/bufbuild/protovalidate"
  - "buf.build/gnostic/gnostic"

breaking:
  use:
    - FILE

lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
