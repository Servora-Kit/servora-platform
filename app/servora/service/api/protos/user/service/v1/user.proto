syntax = "proto3";

package user.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/user/service/v1;userpb";
option java_multiple_files = true;
option java_outer_classname = "UserProtoV1";
option java_package = "dev.servora.api.user.v1";

// 错误码定义
enum ErrorReason {
  // 设置缺省错误码
  option (errors.default_code) = 500;
  // 用户未找到
  USER_NOT_FOUND = 0 [(errors.code) = 404];
  // 删除用户失败
  DELETE_USER_FAILED = 1 [(errors.code) = 500];
  // 更新用户信息失败
  UPDATE_USER_FAILED = 2 [(errors.code) = 500];
  // 保存用户信息失败
  SAVE_USER_FAILED = 3 [(errors.code) = 500];
}

// User gRPC 服务 - 纯 gRPC 接口
service UserService {
  rpc CurrentUserInfo(CurrentUserInfoRequest) returns (CurrentUserInfoResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc SaveUser(SaveUserRequest) returns (SaveUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message UserInfo {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
}

message CurrentUserInfoRequest {}

message CurrentUserInfoResponse {
  int64 id = 1;
  string name = 2;
  string role = 3;
}

message ListUsersRequest {
  pagination.PaginationRequest pagination = 1;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
  pagination.PaginationResponse pagination = 2;
}

message DeleteUserRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0]; // 用户ID必须大于0
}

message DeleteUserResponse {
  bool success = 1; // 删除是否成功
}

message UpdateUserRequest {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  reserved 5, 6, 7, 8, 9;
  reserved "phone", "avatar", "bio", "location", "website";
  string role = 10;
}

message UpdateUserResponse {
  string success = 1;
}

message SaveUserRequest {
  string name = 1 [(buf.validate.field).string.min_len = 5];
  string email = 2 [(buf.validate.field).string.email = true];
  string password = 3 [(buf.validate.field).string = {
    min_len: 5
    max_len: 10
  }];
  reserved 4, 5, 6, 7, 8;
  reserved "phone", "avatar", "bio", "location", "website";
  string role = 9;
}
message SaveUserResponse {
  string id = 1;
}
