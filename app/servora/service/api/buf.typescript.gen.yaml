version: v2

clean: true

managed:
    enabled: false

inputs:
    - directory: app/servora/service/api/protos
      paths:
          - app/servora/service/api/protos/servora/service/v1
          - app/servora/service/api/protos/auth/service/v1
          - app/servora/service/api/protos/user/service/v1

plugins:
    - local: protoc-gen-typescript-http
      out: app/servora/service/web/src/service/gen
