server:
  http:
    addr: "0.0.0.0:8000"
    timeout: 10s
  grpc:
    addr: "0.0.0.0:8001"
    timeout: 10s

data:
  database:
    driver: "postgres"
    source: "host=db user=servora password=servora dbname=iam port=5432 sslmode=disable"
  redis:
    addr: "redis:6379"
    password: "servora_redis_pwd"
    db: 0

app:
  env: "prod"
  external_url: "http://localhost:8000"
  jwt:
    private_key_path: "/app/configs/keys/iam.rsa.pem"
    access_expire: 3600
    refresh_expire: 604800
    issuer: "iam.service"
    audience: "servora"
  openfga:
    api_url: "http://openfga:8080"
    store_id: "${FGA_STORE_ID}"
    model_id: "${FGA_MODEL_ID}"
  log:
    level: 0
    filename: "/app/logs/iam.service.log"
    max_size: 20
    max_age: 30
    max_backups: 10

mail:
  smtp:
    host: "mailpit"
    port: 1025
    use_tls: false
  from:
    address: "noreply@servora.dev"
    name: "Servora"
  base_url: "http://localhost:3000"
  # 可选：挂载模板目录后设置，如 /app/configs/mail-templates
  # template_dir: "/app/configs/mail-templates"

trace:
  endpoint: "otel-collector:4317"
  insecure: true
  sampling_ratio: 1.0

metrics:
  enable: true

registry:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"

discovery:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"
