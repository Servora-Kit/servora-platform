syntax = "proto3";

package organization.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/organization/service/v1;orgpb";
option java_multiple_files = true;
option java_outer_classname = "OrganizationProtoV1";
option java_package = "dev.servora.api.organization.v1";

enum ErrorReason {
  option (errors.default_code) = 500;
  ORGANIZATION_NOT_FOUND = 0 [(errors.code) = 404];
  ORGANIZATION_ALREADY_EXISTS = 1 [(errors.code) = 409];
  ORGANIZATION_MEMBER_NOT_FOUND = 2 [(errors.code) = 404];
  ORGANIZATION_MEMBER_ALREADY_EXISTS = 3 [(errors.code) = 409];
  ORGANIZATION_CREATE_FAILED = 4 [(errors.code) = 500];
  ORGANIZATION_UPDATE_FAILED = 5 [(errors.code) = 500];
  ORGANIZATION_DELETE_FAILED = 6 [(errors.code) = 500];
}

service OrganizationService {
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
}

message OrganizationInfo {
  string id = 1;
  string name = 2;
  string slug = 3;
  string display_name = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message OrganizationMemberInfo {
  string id = 1;
  string organization_id = 2;
  string user_id = 3;
  string user_name = 4;
  string user_email = 5;
  string role = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateOrganizationRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 2, max_len: 128}];
  string slug = 2 [(buf.validate.field).string = {
    min_len: 2,
    max_len: 128,
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
  }];
  string display_name = 3;
}

message CreateOrganizationResponse {
  OrganizationInfo organization = 1;
}

message GetOrganizationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetOrganizationResponse {
  OrganizationInfo organization = 1;
}

message ListOrganizationsRequest {
  pagination.PaginationRequest pagination = 1;
}

message ListOrganizationsResponse {
  repeated OrganizationInfo organizations = 1;
  pagination.PaginationResponse pagination = 2;
}

message UpdateOrganizationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2;
  string display_name = 3;
}

message UpdateOrganizationResponse {
  OrganizationInfo organization = 1;
}

message DeleteOrganizationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteOrganizationResponse {
  bool success = 1;
}

message AddMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  string role = 3 [(buf.validate.field).string = {in: ["owner", "admin", "member"]}];
}

message AddMemberResponse {
  OrganizationMemberInfo member = 1;
}

message RemoveMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveMemberResponse {
  bool success = 1;
}

message ListMembersRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  pagination.PaginationRequest pagination = 2;
}

message ListMembersResponse {
  repeated OrganizationMemberInfo members = 1;
  pagination.PaginationResponse pagination = 2;
}

message UpdateMemberRoleRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  string role = 3 [(buf.validate.field).string = {in: ["owner", "admin", "member"]}];
}

message UpdateMemberRoleResponse {
  OrganizationMemberInfo member = 1;
}
