syntax = "proto3";

package servora.authn.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/authn/service/v1;authnpb";

enum ErrorReason {
  option (errors.default_code) = 500;
  USER_NOT_FOUND = 0 [(errors.code) = 404];
  USER_ALREADY_EXISTS = 1 [(errors.code) = 400];
  INCORRECT_PASSWORD = 2 [(errors.code) = 401];
  INVALID_CREDENTIALS = 3 [(errors.code) = 401];
  INVALID_TOKEN_TYPE = 4 [(errors.code) = 400];
  TOKEN_EXPIRED = 5 [(errors.code) = 401];
  MISSING_TOKEN = 6 [(errors.code) = 401];
  TOKEN_GENERATION_FAILED = 7 [(errors.code) = 500];
  UNAUTHORIZED = 8 [(errors.code) = 403];
  INVALID_REFRESH_TOKEN = 9 [(errors.code) = 401];
  INVALID_VERIFICATION_TOKEN = 10 [(errors.code) = 400];
  INVALID_RESET_TOKEN = 11 [(errors.code) = 400];
  EMAIL_NOT_VERIFIED = 12 [(errors.code) = 403];
  INVALID_CAPTCHA = 13 [(errors.code) = 400];
}

service AuthnService {
  rpc SignupByEmail(SignupByEmailRequest) returns (SignupByEmailResponse);
  rpc LoginByEmailPassword(LoginByEmailPasswordRequest) returns (LoginByEmailPasswordResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc LogoutAllDevices(LogoutAllDevicesRequest) returns (LogoutAllDevicesResponse);
  rpc RequestEmailVerification(RequestEmailVerificationRequest) returns (RequestEmailVerificationResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
}

message SignupByEmailRequest {
  string name = 1 [(buf.validate.field).string.min_len = 5];
  string password = 2 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
  string password_confirm = 3 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
  string email = 4 [(buf.validate.field).string.email = true];
  string cap_token = 5;
}

message SignupByEmailResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
}

message LoginByEmailPasswordRequest {
  string email = 1;
  string password = 2 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
}

message LoginByEmailPasswordResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message LogoutRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message LogoutResponse {
  bool success = 1;
}

message ChangePasswordRequest {
  string current_password = 1 [(buf.validate.field).string.min_len = 1];
  string new_password = 2 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
  string new_password_confirm = 3 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
}

message ChangePasswordResponse {
  bool success = 1;
}

message LogoutAllDevicesRequest {}

message LogoutAllDevicesResponse {
  bool success = 1;
}

message RequestEmailVerificationRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message RequestEmailVerificationResponse {
  bool success = 1;
}

message VerifyEmailRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message VerifyEmailResponse {
  bool success = 1;
}

message RequestPasswordResetRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message RequestPasswordResetResponse {
  bool success = 1;
}

message ResetPasswordRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
  string new_password = 2 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
  string new_password_confirm = 3 [(buf.validate.field).string = {
    min_len: 6
    max_len: 20
  }];
}

message ResetPasswordResponse {
  bool success = 1;
}
