syntax = "proto3";

package servora.user.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "google/protobuf/timestamp.proto";
import "servora/authz/v1/authz.proto";
import "servora/mapper/v1/mapper.proto";
import "servora/pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/user/service/v1;userpb";
option java_multiple_files = true;
option java_outer_classname = "UserProtoV1";
option java_package = "dev.servora.api.user.v1";

// 错误码定义
enum ErrorReason {
  // 设置缺省错误码
  option (errors.default_code) = 500;
  // 用户未找到
  USER_NOT_FOUND = 0 [(errors.code) = 404];
  // 删除用户失败
  DELETE_USER_FAILED = 1 [(errors.code) = 500];
  // 更新用户信息失败
  UPDATE_USER_FAILED = 2 [(errors.code) = 500];
  // 保存用户信息失败
  SAVE_USER_FAILED = 3 [(errors.code) = 500];
  // 创建用户失败
  CREATE_USER_FAILED = 4 [(errors.code) = 500];
}

// User gRPC 服务
service UserService {
  rpc CurrentUserInfo(CurrentUserInfoRequest) returns (CurrentUserInfoResponse) {
    option (servora.authz.v1.rule) = {mode: AUTHZ_MODE_NONE};
  }
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "can_manage_users"
    };
  }
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "can_manage_users"
    };
  }
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (servora.authz.v1.rule) = {mode: AUTHZ_MODE_NONE};
  }
  // 创建用户需要平台管理员权限
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc PurgeUser(PurgeUserRequest) returns (PurgeUserResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc RestoreUser(RestoreUserRequest) returns (RestoreUserResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
}

// UserProfile 对应 OIDC Standard Claims 中的 profile scope 字段。
// 字段命名与 OIDC UserInfo profile 对齐，签发 ID Token 时直接映射。
message UserProfile {
  string name = 1;
  string given_name = 2;
  string family_name = 3;
  string nickname = 4;
  string picture = 5;
  string gender = 6;
  string birthdate = 7;
  string zoneinfo = 8;
  string locale = 9;
}

// User 资源 message — 不含密码等敏感字段（通过 repo 独立参数传递）
message User {
  option (servora.mapper.v1.mapper) = {
    enabled: true
    presets: ["common_proto_entity"]
  };

  string id = 1 [(servora.mapper.v1.mapper_field) = {rename: "ID", converter: CONVERTER_KIND_UUID_STRING}];
  string username = 2;
  string email = 3;
  string role = 4;
  string status = 5;
  bool email_verified = 6;
  string phone = 7;
  bool phone_verified = 8;
  optional google.protobuf.Timestamp email_verified_at = 9 [(servora.mapper.v1.mapper_field) = {converter: CONVERTER_KIND_TIMESTAMP_TIME}];
  UserProfile profile = 50 [(servora.mapper.v1.mapper_field) = {custom: "user_profile"}];
  optional google.protobuf.Timestamp created_at = 100 [(servora.mapper.v1.mapper_field) = {converter: CONVERTER_KIND_TIMESTAMP_TIME}];
  optional google.protobuf.Timestamp updated_at = 101 [(servora.mapper.v1.mapper_field) = {converter: CONVERTER_KIND_TIMESTAMP_TIME}];
}

message CurrentUserInfoRequest {}

message CurrentUserInfoResponse {
  User user = 1;
}

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  servora.pagination.v1.PaginationRequest pagination = 1;
}

message ListUsersResponse {
  repeated User users = 1;
  servora.pagination.v1.PaginationResponse pagination = 2;
}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteUserResponse {
  bool success = 1;
}

message PurgeUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message PurgeUserResponse {
  bool success = 1;
}

message RestoreUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message RestoreUserResponse {
  User user = 1;
}

message CreateUserRequest {
  User data = 1;
  string password = 2 [(buf.validate.field).string = {
    min_len: 6
    max_len: 64
  }];
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1;
  User data = 2;
}

message UpdateUserResponse {
  User user = 1;
}
