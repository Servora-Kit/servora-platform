syntax = "proto3";

package servora.application.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "google/protobuf/timestamp.proto";
import "servora/authz/v1/authz.proto";
import "servora/mapper/v1/mapper.proto";
import "servora/pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/application/service/v1;apppb";
option java_multiple_files = true;
option java_outer_classname = "ApplicationProtoV1";
option java_package = "dev.servora.api.application.v1";

enum ErrorReason {
  option (errors.default_code) = 500;
  APPLICATION_NOT_FOUND = 0 [(errors.code) = 404];
  APPLICATION_ALREADY_EXISTS = 1 [(errors.code) = 409];
  APPLICATION_CREATE_FAILED = 2 [(errors.code) = 500];
  APPLICATION_UPDATE_FAILED = 3 [(errors.code) = 500];
  APPLICATION_DELETE_FAILED = 4 [(errors.code) = 500];
  INVALID_CLIENT_SECRET = 5 [(errors.code) = 401];
}

service ApplicationService {
  // 创建应用需要平台管理员权限
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse) {
    option (servora.authz.v1.rule) = {mode: AUTHZ_MODE_NONE};
  }
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse) {
    option (servora.authz.v1.rule) = {mode: AUTHZ_MODE_NONE};
  }
  rpc UpdateApplication(UpdateApplicationRequest) returns (UpdateApplicationResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc DeleteApplication(DeleteApplicationRequest) returns (DeleteApplicationResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
  rpc RegenerateClientSecret(RegenerateClientSecretRequest) returns (RegenerateClientSecretResponse) {
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
}

// Application 资源 message — 不含 client_secret_hash 等敏感字段
message Application {
  option (servora.mapper.v1.mapper) = {
    enabled: true
    presets: ["common_proto_entity"]
  };

  string id = 1 [(servora.mapper.v1.mapper_field) = {rename: "ID", converter: CONVERTER_KIND_UUID_STRING}];
  string client_id = 2 [(servora.mapper.v1.mapper_field) = {rename: "ClientID"}];
  string name = 3;
  repeated string redirect_uris = 4;
  repeated string scopes = 5;
  repeated string grant_types = 6;
  string application_type = 7;
  string access_token_type = 8;
  // type 区分应用类型：web | native | m2m
  string type = 9;
  int32 id_token_lifetime = 10 [(servora.mapper.v1.mapper_field) = {rename: "IDTokenLifetime", converter: CONVERTER_KIND_INT_INT32}];
  optional google.protobuf.Timestamp created_at = 100 [(servora.mapper.v1.mapper_field) = {converter: CONVERTER_KIND_TIMESTAMP_TIME}];
  optional google.protobuf.Timestamp updated_at = 101 [(servora.mapper.v1.mapper_field) = {converter: CONVERTER_KIND_TIMESTAMP_TIME}];
}

message CreateApplicationRequest {
  Application data = 1;
}

message CreateApplicationResponse {
  Application application = 1;
  string client_secret = 2;
}

message GetApplicationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetApplicationResponse {
  Application application = 1;
}

message ListApplicationsRequest {
  servora.pagination.v1.PaginationRequest pagination = 1;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
  servora.pagination.v1.PaginationResponse pagination = 2;
}

message UpdateApplicationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  Application data = 2;
}

message UpdateApplicationResponse {
  Application application = 1;
}

message DeleteApplicationRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteApplicationResponse {
  bool success = 1;
}

message RegenerateClientSecretRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message RegenerateClientSecretResponse {
  string client_secret = 1;
}
