syntax = "proto3";

package servora.iam.service.v1;

import "google/api/annotations.proto";
import "servora/application/service/v1/application.proto";
import "servora/authz/service/v1/authz.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/iam/service/v1;iampb";

service ApplicationService {
  // 创建应用需要平台管理员权限
  rpc CreateApplication(servora.application.service.v1.CreateApplicationRequest) returns (servora.application.service.v1.CreateApplicationResponse) {
    option (google.api.http) = {
      post: "/v1/applications"
      body: "*"
    };
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }

  rpc GetApplication(servora.application.service.v1.GetApplicationRequest) returns (servora.application.service.v1.GetApplicationResponse) {
    option (google.api.http) = {get: "/v1/applications/{id}"};
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc ListApplications(servora.application.service.v1.ListApplicationsRequest) returns (servora.application.service.v1.ListApplicationsResponse) {
    option (google.api.http) = {get: "/v1/applications"};
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc UpdateApplication(servora.application.service.v1.UpdateApplicationRequest) returns (servora.application.service.v1.UpdateApplicationResponse) {
    option (google.api.http) = {
      put: "/v1/applications/{id}"
      body: "*"
    };
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }

  rpc DeleteApplication(servora.application.service.v1.DeleteApplicationRequest) returns (servora.application.service.v1.DeleteApplicationResponse) {
    option (google.api.http) = {delete: "/v1/applications/{id}"};
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }

  rpc RegenerateClientSecret(servora.application.service.v1.RegenerateClientSecretRequest) returns (servora.application.service.v1.RegenerateClientSecretResponse) {
    option (google.api.http) = {
      post: "/v1/applications/{id}/regenerate-secret"
      body: "*"
    };
    option (servora.authz.service.v1.rule) = {
      mode: AUTHZ_MODE_CHECK
      object_type: "platform"
      relation: "admin"
    };
  }
}
