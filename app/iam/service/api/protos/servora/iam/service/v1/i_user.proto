syntax = "proto3";

package servora.iam.service.v1;

import "google/api/annotations.proto";
import "servora/user/service/v1/user.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/iam/service/v1;iampb";

// UserService exposes UserService methods over HTTP.
// Authorization rules are declared on the underlying servora.user.service.v1.UserService.
service UserService {
  rpc CurrentUserInfo(servora.user.service.v1.CurrentUserInfoRequest) returns (servora.user.service.v1.CurrentUserInfoResponse) {
    option (google.api.http) = {get: "/v1/user/info"};
  }
  rpc GetUser(servora.user.service.v1.GetUserRequest) returns (servora.user.service.v1.GetUserResponse) {
    option (google.api.http) = {get: "/v1/users/{id}"};
  }
  rpc ListUsers(servora.user.service.v1.ListUsersRequest) returns (servora.user.service.v1.ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
  }
  rpc UpdateUser(servora.user.service.v1.UpdateUserRequest) returns (servora.user.service.v1.UpdateUserResponse) {
    option (google.api.http) = {
      post: "/v1/user/update"
      body: "*"
    };
  }
  // 创建用户需要平台管理员权限
  rpc CreateUser(servora.user.service.v1.CreateUserRequest) returns (servora.user.service.v1.CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }
  rpc DeleteUser(servora.user.service.v1.DeleteUserRequest) returns (servora.user.service.v1.DeleteUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{id}"};
  }
  rpc PurgeUser(servora.user.service.v1.PurgeUserRequest) returns (servora.user.service.v1.PurgeUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{id}/purge"};
  }
  rpc RestoreUser(servora.user.service.v1.RestoreUserRequest) returns (servora.user.service.v1.RestoreUserResponse) {
    option (google.api.http) = {
      post: "/v1/users/{id}/restore"
      body: "*"
    };
  }
}
