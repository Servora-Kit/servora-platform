syntax = "proto3";

package servora.authz.service.v1;

import "errors/errors.proto";
import "google/protobuf/descriptor.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/authz/service/v1;authzpb";

enum ErrorReason {
  option (errors.default_code) = 500;
  PERMISSION_DENIED = 0 [(errors.code) = 403];
}

// AuthzMode 定义了 AuthZ 中间件的鉴权模式。
enum AuthzMode {
  // 未指定
  AUTHZ_MODE_UNSPECIFIED = 0;
  // 完全跳过鉴权（公开接口）。
  AUTHZ_MODE_NONE = 1;
  // 执行 OpenFGA check。object_type / relation / id_field 由 AuthzRule 指定。
  AUTHZ_MODE_CHECK = 2;
}

// AuthzRule 用于绑定到 RPC 方法，声明其授权需求。
// object_type 和 relation 为自由字符串，与 OpenFGA model 中的类型/关系名称对应。
message AuthzRule {
  // 鉴权模式。
  AuthzMode mode = 1;
  // OpenFGA 中需要校验的关系，如 "admin", "can_delete"。
  string relation = 2;
  // OpenFGA 中的资源类型，如 "platform", "video", "server"。
  string object_type = 3;
  // 请求中携带资源 ID 的字段名，如 "id"。空时从 actor scope 推断。
  string id_field = 4;
}

extend google.protobuf.MethodOptions {
  // rule 声明了 RPC 方法的授权需求。
  AuthzRule rule = 50100;
}

service AuthzService {
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
}

message CheckPermissionRequest {
  string user_id = 1;
  string relation = 2;
  string object_type = 3;
  string object_id = 4;
}

message CheckPermissionResponse {
  bool allowed = 1;
}
