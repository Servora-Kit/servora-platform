syntax = "proto3";

package project.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/project/service/v1;projectpb";
option java_multiple_files = true;
option java_outer_classname = "ProjectProtoV1";
option java_package = "dev.servora.api.project.v1";

enum ErrorReason {
  option (errors.default_code) = 500;
  PROJECT_NOT_FOUND = 0 [(errors.code) = 404];
  PROJECT_ALREADY_EXISTS = 1 [(errors.code) = 409];
  PROJECT_MEMBER_NOT_FOUND = 2 [(errors.code) = 404];
  PROJECT_MEMBER_ALREADY_EXISTS = 3 [(errors.code) = 409];
  PROJECT_CREATE_FAILED = 4 [(errors.code) = 500];
  PROJECT_UPDATE_FAILED = 5 [(errors.code) = 500];
  PROJECT_DELETE_FAILED = 6 [(errors.code) = 500];
}

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
}

message ProjectInfo {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  string slug = 4;
  string description = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ProjectMemberInfo {
  string id = 1;
  string project_id = 2;
  string user_id = 3;
  string user_name = 4;
  string user_email = 5;
  string role = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateProjectRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {min_len: 2, max_len: 128}];
  string slug = 3 [(buf.validate.field).string = {
    min_len: 2,
    max_len: 128,
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
  }];
  string description = 4;
}

message CreateProjectResponse {
  ProjectInfo project = 1;
}

message GetProjectRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetProjectResponse {
  ProjectInfo project = 1;
}

message ListProjectsRequest {
  string organization_id = 1 [(buf.validate.field).string.uuid = true];
  pagination.PaginationRequest pagination = 2;
}

message ListProjectsResponse {
  repeated ProjectInfo projects = 1;
  pagination.PaginationResponse pagination = 2;
}

message UpdateProjectRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2;
  string description = 3;
}

message UpdateProjectResponse {
  ProjectInfo project = 1;
}

message DeleteProjectRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteProjectResponse {
  bool success = 1;
}

message AddMemberRequest {
  string project_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  string role = 3 [(buf.validate.field).string = {in: ["admin", "developer", "viewer"]}];
}

message AddMemberResponse {
  ProjectMemberInfo member = 1;
}

message RemoveMemberRequest {
  string project_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveMemberResponse {
  bool success = 1;
}

message ListMembersRequest {
  string project_id = 1 [(buf.validate.field).string.uuid = true];
  pagination.PaginationRequest pagination = 2;
}

message ListMembersResponse {
  repeated ProjectMemberInfo members = 1;
  pagination.PaginationResponse pagination = 2;
}

message UpdateMemberRoleRequest {
  string project_id = 1 [(buf.validate.field).string.uuid = true];
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  string role = 3 [(buf.validate.field).string = {in: ["admin", "developer", "viewer"]}];
}

message UpdateMemberRoleResponse {
  ProjectMemberInfo member = 1;
}
