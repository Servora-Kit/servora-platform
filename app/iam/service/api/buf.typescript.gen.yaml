version: v2

clean: false

managed:
    enabled: false

# Gateway (HTTP) + domain protos referenced by gateway (for data models).
# All packages exposed via IAM HTTP APIs are included.
inputs:
    - directory: app/iam/service/api/protos
      paths:
          - app/iam/service/api/protos/servora/iam/service/v1
          - app/iam/service/api/protos/servora/authn/service/v1
          - app/iam/service/api/protos/servora/user/service/v1
          - app/iam/service/api/protos/servora/application/service/v1

plugins:
    - local: protoc-gen-typescript-http
      out: api/gen/ts
