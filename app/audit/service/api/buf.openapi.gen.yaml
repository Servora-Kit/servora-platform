version: v2

clean: false

managed:
    enabled: true

    disable:
        - module: buf.build/googleapis/googleapis
        - module: buf.build/bufbuild/protovalidate
        - module: buf.build/kratos/apis
        - module: buf.build/gnostic/gnostic
        - module: buf.build/gogo/protobuf
        - module: buf.build/menta2k-org/redact

    override:
        - file_option: go_package_prefix
          value: github.com/Servora-Kit/servora-platform/api/gen/go

inputs:
    - directory: app/audit/service/api/protos
      paths:
          - app/audit/service/api/protos/servora/audit/service/v1

plugins:
    - local: protoc-gen-openapi
      out: app/audit/service/internal/assets
      opt:
          - naming=json
          - depth=2
          - default_response=false
          - enum_type=string
          - output_mode=merged
          - fq_schema_naming=false
