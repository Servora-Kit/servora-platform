syntax = "proto3";

package servora.audit.service.v1;

import "google/api/annotations.proto";
import "servora/audit/service/v1/audit.proto";

option go_package = "github.com/Servora-Kit/servora-platform/api/gen/go/servora/audit/service/v1;auditsvcpb";

service AuditHTTPService {
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse) {
    option (google.api.http) = {
      get: "/v1/audit/events"
    };
  }

  rpc CountAuditEvents(CountAuditEventsRequest) returns (CountAuditEventsResponse) {
    option (google.api.http) = {
      get: "/v1/audit/events:count"
    };
  }
}
