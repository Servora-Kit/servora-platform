syntax = "proto3";

package servora.audit.service.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Servora-Kit/servora-platform/api/gen/go/servora/audit/service/v1;auditsvcpb";

// AuditQueryService provides read-only access to persisted audit events.
service AuditQueryService {
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc CountAuditEvents(CountAuditEventsRequest) returns (CountAuditEventsResponse);
}

// AuditEventItem mirrors the ClickHouse audit_events row.
message AuditEventItem {
  string event_id = 1;
  string event_type = 2;
  string event_version = 3;
  google.protobuf.Timestamp occurred_at = 4;

  string service = 5;
  string operation = 6;

  string actor_id = 7;
  string actor_type = 8;
  string actor_display_name = 9;

  string target_type = 10;
  string target_id = 11;
  string target_name = 12;

  bool success = 13;
  string error_code = 14;
  string error_message = 15;

  string trace_id = 16;
  string request_id = 17;

  // detail is a JSON string serialized from the proto oneof detail field.
  string detail = 18;
}

message ListAuditEventsRequest {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
  repeated string event_types = 3;
  string actor_id = 4;
  string service = 5;
  int32 page_size = 6;
  string page_token = 7;
}

message ListAuditEventsResponse {
  repeated AuditEventItem events = 1;
  string next_page_token = 2;
}

message CountAuditEventsRequest {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
  repeated string event_types = 3;
  string actor_id = 4;
  string service = 5;
}

message CountAuditEventsResponse {
  int64 total_count = 1;
}
