server:
  http:
    listen:
      addr: "0.0.0.0:8000"
      timeout: 30s
  grpc:
    listen:
      addr: "0.0.0.0:8001"
      timeout: 30s

data:
  kafka:
    brokers:
      - localhost:29092
    client_id: audit-service
    consumer_group: audit-consumer
    required_acks: 1
  clickhouse:
    addrs:
      - localhost:19000
    database: servora_audit
    username: servora
    password: servora_ch_pwd
    dial_timeout: 10s
    read_timeout: 30s
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 300s

app:
  name: audit.service
  version: dev
  env: dev
  audit:
    enabled: true
    emitter_type: noop
    topic: servora.audit.events
    service_name: audit
    consumer_batch_size: 100
    consumer_flush_interval: 1s
    retention_days: 90
  log:
    level: 0
    filename: "./logs/audit.service.log"
    max_size: 20
    max_age: 30
    max_backups: 10

trace:
  endpoint: "localhost:4317"
  insecure: true
  sampling_ratio: 1.0

metrics:
  enable: true

registry:
  consul:
    addr: "${REGISTRY_CONSUL_ADDR:localhost:8500}"
    scheme: "${REGISTRY_CONSUL_SCHEME:http}"
    datacenter: "${REGISTRY_CONSUL_DC:dc1}"
    tags:
      - "traefik.enable=true"
      - "traefik.http.routers.audit-api.rule=PathPrefix(`/v1/audit`)"
      - "traefik.http.routers.audit-api.entrypoints=web"
      - "traefik.http.routers.audit-api.service=audit-http"
      - "traefik.http.services.audit-http.loadbalancer.server.port=8000"

discovery:
  consul:
    addr: "${DISCOVERY_CONSUL_ADDR:localhost:8500}"
    scheme: "${DISCOVERY_CONSUL_SCHEME:http}"
    datacenter: "${DISCOVERY_CONSUL_DC:dc1}"
